<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Match Pulse Rugby">
  <title>Match Pulse Rugby</title>
  <defs>
    <linearGradient id="mpBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0E7A4D"/>
      <stop offset="0.55" stop-color="#076945"/>
      <stop offset="1" stop-color="#064D36"/>
    </linearGradient>
    <radialGradient id="mpGlow" cx="36%" cy="34%" r="80%">
      <stop offset="0" stop-color="#16B37E" stop-opacity="0.45"/>
      <stop offset="0.6" stop-color="#0B7A50" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.20"/>
    </radialGradient>
  </defs>

  <!-- Full-bleed background so the icon works as a maskable PWA icon -->
  <rect width="512" height="512" fill="url(#mpBg)"/>
  <rect width="512" height="512" fill="url(#mpGlow)"/>

  <!-- Rugby ball, tilted, kept inside the maskable safe zone -->
  <g transform="rotate(-30 256 256)">
    <ellipse cx="256" cy="256" rx="128" ry="80" fill="#FFFFFF"/>
    <ellipse cx="256" cy="256" rx="128" ry="80" fill="none" stroke="#053C2A" stroke-opacity="0.10" stroke-width="6"/>
    <!-- central seam -->
    <line x1="256" y1="200" x2="256" y2="312" stroke="#0B6E48" stroke-width="9" stroke-linecap="round"/>
    <!-- lacing -->
    <line x1="238" y1="228" x2="274" y2="228" stroke="#0B6E48" stroke-width="8" stroke-linecap="round"/>
    <line x1="238" y1="250" x2="274" y2="250" stroke="#0B6E48" stroke-width="8" stroke-linecap="round"/>
    <line x1="238" y1="272" x2="274" y2="272" stroke="#0B6E48" stroke-width="8" stroke-linecap="round"/>
    <line x1="238" y1="294" x2="274" y2="294" stroke="#0B6E48" stroke-width="8" stroke-linecap="round"/>
  </g>

  <!-- Pulse / heartbeat line — the Match Pulse signature -->
  <path d="M 84 268 H 168 L 208 168 L 266 356 L 306 268 H 428"
        fill="none" stroke="#00C97A" stroke-width="24"
        stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 84 268 H 168 L 208 168 L 266 356 L 306 268 H 428"
        fill="none" stroke="#FFFFFF" stroke-width="8"
        stroke-linecap="round" stroke-linejoin="round" stroke-opacity="0.9"/>
</svg>
