name: Deploy to Firebase Hosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          # Pinned: Node 24.17.0 (released 2026-06-24) broke service-account
          # OAuth token fetch in gaxios/google-auth-library ("Premature close"
          # on /oauth2/v4/token). 24.16.0 is the last known-good version.
          # Bump deliberately once the upstream regression is confirmed fixed.
          node-version: '24.16.0'
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Guard: a missing Firebase web key produces a valid-but-dead bundle
      # (src/firebase.js sets `configured = !!apiKey`), which would otherwise
      # deploy silently and show "Firebase is not configured yet" on the live
      # site. Fail loudly here instead of shipping it.
      - name: Verify Firebase secrets are present
        run: |
          if [ -z "${{ secrets.VITE_FIREBASE_API_KEY }}" ]; then
            echo "::error::VITE_FIREBASE_API_KEY secret is missing — refusing to ship a Firebase-less bundle. Add the VITE_FIREBASE_* secrets under Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Generate sitemap
        run: npm install firebase-admin --no-save && node scripts/generate-sitemap.js
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Build
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY:             ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN:         ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID:          ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET:      ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID:              ${{ secrets.VITE_FIREBASE_APP_ID }}

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: match-pulse-4560e

      # The hosting action above only deploys hosting. Firestore rules and the
      # composite indexes (required by the matches status+scheduledAt queries on
      # the home page) must be deployed separately, or those queries fail with
      # a "query requires an index" error.
      #
      # IAM: the FIREBASE_SERVICE_ACCOUNT used below must have these roles, or this
      # step fails with a serviceusage.googleapis.com permission-denied error:
      #   - Firebase Admin        (roles/firebase.admin)
      #   - Cloud Datastore Owner (roles/datastore.owner)
      #   - Service Usage Viewer  (roles/serviceusage.serviceUsageViewer)
      # See DEPLOYMENT.md -> "CI service account - required IAM roles".
      - name: Deploy Firestore rules & indexes
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-sa.json
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "FIREBASE_SERVICE_ACCOUNT not set — skipping Firestore rules & indexes deploy."
            exit 0
          fi
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$GOOGLE_APPLICATION_CREDENTIALS"
          npx --yes firebase-tools@latest deploy \
            --only firestore:rules,firestore:indexes \
            --project match-pulse-4560e \
            --non-interactive
          rm -f "$GOOGLE_APPLICATION_CREDENTIALS"
