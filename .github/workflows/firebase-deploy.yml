name: Deploy to Firebase

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          # Pinned: Node 24.17.0 (released 2026-06-24) broke service-account
          # OAuth token fetch in gaxios/google-auth-library ("Premature close"
          # on /oauth2/v4/token). 24.16.0 is the last known-good version.
          # Bump deliberately once the upstream regression is confirmed fixed.
          node-version: '24.16.0'
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Guard: a missing Firebase web key produces a valid-but-dead bundle
      # (src/firebase.js sets `configured = !!apiKey`), which would otherwise
      # deploy silently and show "Firebase is not configured yet" on the live
      # site. Fail loudly here instead of shipping it.
      - name: Verify Firebase secrets are present
        run: |
          if [ -z "${{ secrets.VITE_FIREBASE_API_KEY }}" ]; then
            echo "::error::VITE_FIREBASE_API_KEY secret is missing — refusing to ship a Firebase-less bundle. Add the VITE_FIREBASE_* secrets under Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Generate sitemap
        run: npm install firebase-admin --no-save && node scripts/generate-sitemap.js
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          PUBLIC_BASE_URL:          ${{ secrets.PUBLIC_BASE_URL }}

      - name: Build
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY:             ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN:         ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID:          ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET:      ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID:              ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_PUBLIC_BASE_URL:              ${{ secrets.PUBLIC_BASE_URL }}

      # Deploy the website — the one required step. Publishes the static site
      # (dist/) to Firebase Hosting's live channel using the same reliable action
      # the hockey repo uses. firebase.json serves dist/ as a plain static SPA
      # (** -> /index.html), with no Cloud Function in the request path.
      # (Classic Firebase Hosting — do NOT create a Firebase App Hosting backend
      # for this repo; that product runs it as a web server on $PORT, which a
      # static Vite SPA never does. See DEPLOYMENT.md.)
      - name: Deploy website (Firebase Hosting)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: match-pulse-rugby

      # Firestore security rules + indexes and Storage rules. Best-effort: a
      # missing IAM permission (the serviceusage 403 error) or a product that is
      # not set up yet must NOT block the website deploy above, so this step is
      # non-blocking. To turn it green: grant the deploy service account the
      # roles in DEPLOYMENT.md ("CI service account - required IAM roles") and
      # make sure Firestore and Storage are set up on the project, then re-run.
      - name: Deploy Firestore & Storage rules (optional, non-blocking)
        continue-on-error: true
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-sa.json
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "FIREBASE_SERVICE_ACCOUNT not set — skipping rules deploy."
            exit 0
          fi
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$GOOGLE_APPLICATION_CREDENTIALS"
          npx --yes firebase-tools@latest deploy \
            --only firestore:rules,firestore:indexes,storage \
            --project match-pulse-rugby \
            --non-interactive
          rm -f "$GOOGLE_APPLICATION_CREDENTIALS"

      # Optional backend functions — automatic stats recompute, scheduled
      # fixture sweeps, invite/contact email. The site serves fine without
      # them, so this step is best-effort: a failure (e.g. Blaze plan or IAM
      # not yet set up) does NOT fail the deploy. Enable them by making sure the
      # service account has Cloud Functions Admin + Service Account User and the
      # project is on the Blaze plan; keys come from functions/.env.
      - name: Deploy Cloud Functions (optional, non-blocking)
        continue-on-error: true
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-sa.json
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "FIREBASE_SERVICE_ACCOUNT not set — skipping functions deploy."
            exit 0
          fi
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$GOOGLE_APPLICATION_CREDENTIALS"
          npx --yes firebase-tools@latest deploy \
            --only functions \
            --project match-pulse-rugby \
            --non-interactive
          rm -f "$GOOGLE_APPLICATION_CREDENTIALS"
