name: Deploy to Firebase

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          # Pinned: Node 24.17.0 (released 2026-06-24) broke service-account
          # OAuth token fetch in gaxios/google-auth-library ("Premature close"
          # on /oauth2/v4/token). 24.16.0 is the last known-good version.
          # Bump deliberately once the upstream regression is confirmed fixed.
          node-version: '24.16.0'
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Guard: a missing Firebase web key produces a valid-but-dead bundle
      # (src/firebase.js sets `configured = !!apiKey`), which would otherwise
      # deploy silently and show "Firebase is not configured yet" on the live
      # site. Fail loudly here instead of shipping it.
      - name: Verify Firebase secrets are present
        run: |
          if [ -z "${{ secrets.VITE_FIREBASE_API_KEY }}" ]; then
            echo "::error::VITE_FIREBASE_API_KEY secret is missing — refusing to ship a Firebase-less bundle. Add the VITE_FIREBASE_* secrets under Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Generate sitemap
        run: npm install firebase-admin --no-save && node scripts/generate-sitemap.js
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          PUBLIC_BASE_URL:          ${{ secrets.PUBLIC_BASE_URL }}

      - name: Build
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY:             ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN:         ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID:          ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET:      ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID:              ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_PUBLIC_BASE_URL:              ${{ secrets.PUBLIC_BASE_URL }}

      # One full deploy — Hosting, Functions, Firestore rules+indexes, Storage.
      #
      # Functions are NOT optional here: firebase.json rewrites every page
      # request (`**`), plus /sitemap.xml and /payfast/itn, to Cloud Functions,
      # so Hosting without Functions would 500 on every load. Deploying them
      # together in a single operation keeps the rewrites and their targets in
      # step. (This app uses classic Firebase Hosting — do NOT create a Firebase
      # App Hosting backend for it; that product runs the repo as a web server
      # on $PORT, which a static Vite SPA never does. See DEPLOYMENT.md.)
      #
      # IAM: the FIREBASE_SERVICE_ACCOUNT must have these roles, or this step
      # fails with a serviceusage.googleapis.com permission-denied error:
      #   - Firebase Admin              (roles/firebase.admin)
      #   - Cloud Datastore Owner       (roles/datastore.owner)
      #   - Cloud Functions Admin       (roles/cloudfunctions.admin)
      #   - Service Account User        (roles/iam.serviceAccountUser)
      #   - Service Usage Viewer        (roles/serviceusage.serviceUsageViewer)
      # See DEPLOYMENT.md -> "CI service account - required IAM roles".
      - name: Deploy to Firebase (hosting, functions, firestore, storage)
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/firebase-sa.json
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          if [ -z "$FIREBASE_SERVICE_ACCOUNT" ]; then
            echo "FIREBASE_SERVICE_ACCOUNT not set — skipping deploy."
            exit 0
          fi
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$GOOGLE_APPLICATION_CREDENTIALS"
          npx --yes firebase-tools@latest deploy \
            --only hosting,functions,firestore:rules,firestore:indexes,storage \
            --project "${{ secrets.FIREBASE_PROJECT_ID }}" \
            --non-interactive
          rm -f "$GOOGLE_APPLICATION_CREDENTIALS"
